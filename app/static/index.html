<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jira AI Chat Bot</title>
  <style>
    :root {
      --bg: #0b1220;
      --panel: #131c2f;
      --text: #e6edf7;
      --muted: #99a9c4;
      --accent: #3aa3ff;
      --user: #1e7de6;
      --bot: #1b2842;
      --border: #2a3b5b;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
      background: radial-gradient(circle at top right, #1a2a4a, var(--bg) 55%);
      color: var(--text);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 16px;
    }
    .app {
      width: min(900px, 100%);
      height: min(88vh, 900px);
      border: 1px solid var(--border);
      border-radius: 16px;
      background: linear-gradient(180deg, rgba(19,28,47,.95), rgba(14,22,37,.95));
      display: grid;
      grid-template-rows: auto 1fr auto;
      overflow: hidden;
      box-shadow: 0 18px 50px rgba(0,0,0,.45);
    }
    .header {
      padding: 14px 18px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    .title { font-weight: 700; letter-spacing: 0.2px; }
    .hint { color: var(--muted); font-size: 13px; }
    .admin-link {
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 6px 10px;
      font-size: 13px;
      text-decoration: none;
    }
    .chat {
      padding: 18px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .bubble {
      max-width: 82%;
      padding: 11px 13px;
      border-radius: 12px;
      line-height: 1.45;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .user { align-self: flex-end; background: var(--user); }
    .bot {
      align-self: flex-start;
      background: var(--bot);
      border: 1px solid var(--border);
    }
    .composer {
      border-top: 1px solid var(--border);
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      padding: 12px;
    }
    textarea {
      width: 100%;
      resize: none;
      min-height: 54px;
      max-height: 180px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: #0e1628;
      color: var(--text);
      padding: 12px;
      outline: none;
      font: inherit;
    }
    button {
      border: 0;
      border-radius: 10px;
      background: var(--accent);
      color: #08101c;
      font-weight: 700;
      padding: 0 18px;
      cursor: pointer;
    }
    button:disabled { opacity: .6; cursor: wait; }
    .download-link {
      display: inline-flex;
      width: fit-content;
      margin-top: 10px;
      padding: 8px 10px;
      border-radius: 8px;
      background: var(--accent);
      color: #061120;
      font-weight: 700;
      text-decoration: none;
    }
    .pdf-inline {
      display: block;
      width: min(760px, 100%);
      height: 420px;
      margin-top: 12px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: #07101e;
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="header">
      <div class="title">Jira AI Chat Bot</div>
      <div class="hint">Try: "Najdi otvorene tickety" alebo "Sprav summary pre KAN-1"</div>
      <a class="admin-link" href="/admin">Admin</a>
    </header>
    <section class="chat" id="chat"></section>
    <form class="composer" id="form">
      <textarea id="input" placeholder="Napíš správu..." required></textarea>
      <button id="send" type="submit">Send</button>
    </form>
  </main>

  <script>
    const chatEl = document.getElementById("chat");
    const formEl = document.getElementById("form");
    const inputEl = document.getElementById("input");
    const sendEl = document.getElementById("send");
    let currentIssueKey = null;
    let pendingAction = null;
    const conversation = [];

    function addBubble(text, role, links = [], embeds = []) {
      const el = document.createElement("div");
      el.className = `bubble ${role}`;
      const body = document.createElement("div");
      body.textContent = text;
      el.appendChild(body);
      for (const link of links) {
        const a = document.createElement("a");
        a.className = "download-link";
        a.href = link.href;
        a.target = "_blank";
        a.rel = "noopener";
        a.textContent = link.label;
        el.appendChild(a);
      }
      for (const embed of embeds) {
        if (embed.type !== "pdf") continue;
        const iframe = document.createElement("iframe");
        iframe.className = "pdf-inline";
        iframe.src = embed.href;
        iframe.title = embed.label || "PDF document";
        el.appendChild(iframe);
      }
      chatEl.appendChild(el);
      chatEl.scrollTop = chatEl.scrollHeight;
    }

    function responseLinks(data) {
      const links = [];
      if (data.data?.document_url) {
        links.push({ href: data.data.document_url, label: `Stiahnut ${data.data.file_name || "dokument"}` });
      }
      if (data.data?.protocol_url) {
        links.push({ href: data.data.protocol_url, label: "Stiahnut protokol" });
      }
      return links;
    }

    function responseEmbeds(data) {
      if (data.data?.document_url && String(data.data?.format || "").toLowerCase() === "pdf") {
        return [{ type: "pdf", href: data.data.document_url, label: data.data.file_name || "PDF dokument" }];
      }
      return [];
    }

    function addToConversation(role, content) {
      conversation.push({ role, content: String(content || "") });
      if (conversation.length > 40) {
        conversation.splice(0, conversation.length - 40);
      }
    }

    function normalizeResponse(data) {
      if (data.action === "assets_print") {
        const lines = [];
        if (data.data?.protocol) {
          lines.push(`${data.data.protocol}`);
        } else {
          lines.push(`${data.message || "Assets print protocol ready."}`);
        }
        if (data.data?.protocol_url) {
          lines.push(`\nSubor: ${data.data.protocol_url}`);
        }
        return lines.join("\n");
      }

      if ((data.action === "offboarding" || data.action === "onboarding") && data.data?.document_url) {
        const lines = [data.message || "Dokument je pripraveny."];
        if (data.data?.template?.name) lines.push(`Sablona: ${data.data.template.name}`);
        if (data.data?.template_error) lines.push(`Poznamka: sablona nesla vyplnit, preto som vytvoril zalozny PDF dokument.`);
        if (data.data?.format) lines.push(`Format: ${data.data.format}`);
        if (Array.isArray(data.data?.assets)) lines.push(`Zariadenia: ${data.data.assets.length}`);
        if (Array.isArray(data.data?.assigned_assets)) lines.push(`Priradene v Assets: ${data.data.assigned_assets.length}`);
        if (Array.isArray(data.data?.unassigned_assets)) lines.push(`Odassignovane v Assets: ${data.data.unassigned_assets.length}`);
        if (Array.isArray(data.data?.assign_errors) && data.data.assign_errors.length) lines.push(`Chyby priradenia: ${data.data.assign_errors.length}`);
        if (Array.isArray(data.data?.unassign_errors) && data.data.unassign_errors.length) lines.push(`Chyby odassignovania: ${data.data.unassign_errors.length}`);
        lines.push(`Subor: ${data.data.document_url}`);
        return lines.join("\n");
      }

      const lines = [];
      lines.push(`${data.message || "Done."}`);
      if (data.action) lines.push(`Action: ${data.action}`);
      if (data.data?.protocol) lines.push(`\n${data.data.protocol}`);
      if (data.data?.jql) lines.push(`JQL: ${data.data.jql}`);
      if (typeof data.data?.total === "number") lines.push(`Total: ${data.data.total}`);
      if (Array.isArray(data.data?.users) && data.data.users.length) {
        lines.push("\nUsers:");
        for (const u of data.data.users.slice(0, 20)) {
          lines.push(`- ${u.display_name || "(no name)"}${u.email ? ` <${u.email}>` : ""}`);
        }
      }
      if (data.data?.summary) lines.push(`\n${data.data.summary}`);
      if (data.data?.key) lines.push(`Ticket: ${data.data.key}`);
      if (Array.isArray(data.data?.issues) && data.data.issues.length) {
        lines.push("\nIssues:");
        for (const it of data.data.issues.slice(0, 8)) {
          lines.push(`- ${it.key}: ${it.summary || "(no summary)"}`);
        }
      }
      return lines.join("\n");
    }

    function captureContextIssue(data) {
      if (!data || !data.data) return;
      if (data.data.pending_action) {
        pendingAction = data.data.pending_action;
      } else if (data.action !== "chat") {
        pendingAction = null;
      }
      if (typeof data.data.issue_key === "string") {
        currentIssueKey = data.data.issue_key;
        return;
      }
      if (typeof data.data.key === "string") {
        currentIssueKey = data.data.key;
        return;
      }
      if (Array.isArray(data.data.created) && data.data.created.length) {
        const last = data.data.created[data.data.created.length - 1];
        if (last && typeof last.key === "string") {
          currentIssueKey = last.key;
          return;
        }
      }
      if (Array.isArray(data.data.issues) && data.data.issues.length) {
        const first = data.data.issues[0];
        if (first && typeof first.key === "string") {
          currentIssueKey = first.key;
        }
      }
    }

    addBubble("Ahoj, som Jira bot. Napis, co potrebujes urobit s ticketmi.", "bot");
    addToConversation("assistant", "Ahoj, som Jira bot. Napis, co potrebujes urobit s ticketmi.");

    formEl.addEventListener("submit", async (e) => {
      e.preventDefault();
      const message = inputEl.value.trim();
      if (!message) return;

      addBubble(message, "user");
      addToConversation("user", message);
      inputEl.value = "";
      sendEl.disabled = true;

      try {
        const res = await fetch("/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            message,
            max_results: 20,
            max_comments: 20,
            current_issue_key: currentIssueKey,
            history: conversation.slice(-20),
            pending_action: pendingAction,
          }),
        });
        const data = await res.json();
        if (!res.ok) {
          addBubble(`Error: ${data.detail || "Request failed"}`, "bot");
          addToConversation("assistant", `Error: ${data.detail || "Request failed"}`);
        } else {
          captureContextIssue(data);
          const normalized = normalizeResponse(data);
          addBubble(normalized, "bot", responseLinks(data), responseEmbeds(data));
          addToConversation("assistant", normalized);
        }
      } catch (err) {
        addBubble(`Error: ${err.message}`, "bot");
      } finally {
        sendEl.disabled = false;
        inputEl.focus();
      }
    });

    inputEl.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        formEl.requestSubmit();
      }
    });
  </script>
</body>
</html>
