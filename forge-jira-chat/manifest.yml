modules:
  jira:issuePanel:
    - key: jira-ai-chat-panel
      resource: chat-panel
      resolver:
        function: resolver
      title: Jira AI Chat
      icon: https://developer.atlassian.com/platform/forge/images/icons/issue-panel-icon.svg
  function:
    - key: resolver
      handler: src/index.handler

resources:
  - key: chat-panel
    path: static/chat-ui/build
  - key: chat-modal
    path: static/chat-ui/build

permissions:
  scopes:
    - read:jira-work
    - write:jira-work
  external:
    fetch:
      backend:
        - "http://76.13.148.10:8080"
        - "https://76.13.148.10:8080"

environment:
  variables:
    - BOT_BACKEND_URL
    - BOT_WIDGET_SECRET
