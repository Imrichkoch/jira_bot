app:
  runtime:
    name: nodejs22.x
  id: ari:cloud:ecosystem::app/fce9f58d-ff9c-41be-ac46-532fa4d906dc

modules:
  jira:issuePanel:
    - key: jira-ai-chat-panel
      resource: chat-panel
      resolver:
        function: resolver
      title: Jira AI Chat
      viewportSize: medium
      icon: https://developer.atlassian.com/platform/forge/images/icons/issue-panel-icon.svg
  function:
    - key: resolver
      handler: index.handler

resources:
  - key: chat-panel
    path: static/chat-ui/build
  - key: chat-modal
    path: static/chat-ui/build

permissions:
  scopes:
    - read:jira-work
    - write:jira-work
  external:
    fetch:
      backend:
        - "https://jira.raizenko.cloud"

environment:
  variables:
    - BOT_BACKEND_URL
    - BOT_WIDGET_SECRET
