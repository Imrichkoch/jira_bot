<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jira AI Chat</title>
    <style>
      :root {
        --bg: #0d1b33;
        --panel: #13284b;
        --text: #eaf2ff;
        --muted: #adc4e9;
        --accent: #4aa7ff;
        --user: #2f81f7;
        --bot: #1a2e54;
        --border: #2d4674;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
        background: linear-gradient(180deg, #10203c, #09172d);
        color: var(--text);
      }
      .app {
        height: 100vh;
        display: grid;
        grid-template-rows: auto 1fr auto;
      }
      .head {
        padding: 10px 12px;
        border-bottom: 1px solid var(--border);
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 8px;
      }
      .title { font-weight: 700; font-size: 14px; }
      .issue { color: var(--muted); font-size: 12px; }
      .btn {
        border: 0;
        border-radius: 8px;
        background: var(--accent);
        color: #05101e;
        padding: 6px 10px;
        font-size: 12px;
        font-weight: 700;
        cursor: pointer;
      }
      .chat {
        padding: 12px;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .bubble {
        border-radius: 10px;
        padding: 9px 10px;
        line-height: 1.4;
        white-space: pre-wrap;
        word-break: break-word;
        max-width: 90%;
      }
      .user {
        align-self: flex-end;
        background: var(--user);
        color: #fff;
      }
      .bot {
        align-self: flex-start;
        background: var(--bot);
        border: 1px solid var(--border);
      }
      .composer {
        border-top: 1px solid var(--border);
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 8px;
        padding: 10px;
      }
      textarea {
        width: 100%;
        min-height: 48px;
        max-height: 140px;
        resize: none;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: #0c1a31;
        color: var(--text);
        padding: 10px;
        font: inherit;
      }
      button:disabled { opacity: 0.6; }
    </style>
  </head>
  <body>
    <main class="app">
      <header class="head">
        <div>
          <div class="title">Jira AI Chat</div>
          <div id="issue" class="issue">Issue: -</div>
        </div>
        <button id="popout" class="btn" type="button">Popout</button>
      </header>
      <section id="chat" class="chat"></section>
      <form id="form" class="composer">
        <textarea id="input" placeholder="Napis, co treba urobit..." required></textarea>
        <button id="send" class="btn" type="submit">Send</button>
      </form>
    </main>
    <script type="module" src="/src/main.js"></script>
  </body>
  </html>
